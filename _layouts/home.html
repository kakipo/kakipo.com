<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>内藤研介 / Kensuke NAITO / kakipo</title>
  <meta name="description" content="内藤研介（Kensuke NAITO / kakipo）のプロフィールページ。ソフトウェアエンジニア・起業家・投資家。広島出身、東京在住。">
  <link rel="canonical" href="https://kakipo.com/">

  <!-- Open Graph -->
  <meta property="og:type"        content="profile">
  <meta property="og:url"         content="https://kakipo.com/">
  <meta property="og:title"       content="内藤研介 / Kensuke NAITO / kakipo">
  <meta property="og:description" content="内藤研介（Kensuke NAITO / kakipo）のプロフィールページ。ソフトウェアエンジニア・起業家・投資家。広島出身、東京在住。">
  <meta property="og:locale"      content="ja_JP">
  <meta property="profile:first_name" content="研介">
  <meta property="profile:last_name"  content="内藤">
  <meta property="profile:username"   content="kakipo">

  <!-- schema.org Person (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "内藤研介",
    "alternateName": ["Kensuke NAITO", "kakipo"],
    "url": "https://kakipo.com",
    "jobTitle": ["ソフトウェアエンジニア", "起業家", "投資家"],
    "birthDate": "1984",
    "birthPlace": { "@type": "Place", "name": "広島" },

    "sameAs": [

  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif;
      touch-action: none;       /* ブラウザのスクロール/ズーム操作を無効化 */
      overscroll-behavior: none; /* iOS のバウンス効果を抑止 */
    }

    /* Visually hidden but accessible to screen readers */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* Skip link — visible only on keyboard focus */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 8px;
      padding: 8px 16px;
      background: #fff;
      color: #000;
      text-decoration: underline;
      border-radius: 4px;
      z-index: 100;
    }
    .skip-link:focus { top: 8px; }

    #gol-canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .content {
      position: relative;
      max-width: 640px;
      margin: 60px auto;
      padding: 40px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      transition: opacity 0.3s ease;
    }
    .content.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #card-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      border-radius: 50%;
      font-size: 1.4rem;
      line-height: 1;
      color: #999;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #card-close:hover { background: rgba(0,0,0,0.07); color: #333; }
    #card-close:focus { outline: 2px solid #333; outline-offset: 2px; }

    .links a:focus {
      outline: 2px solid #333;
      outline-offset: 2px;
      border-radius: 2px;
    }
    .links { line-height: 2.2; }
    .links span { color: #ccc; margin: 0 6px; }

    #gol-reset {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(0, 0, 0, 0.5);
      border-radius: 6px;
      padding: 10px 14px;
      min-height: 44px;
      font-size: 1.2rem;
      line-height: 1;
      font-family: inherit;
      color: #555;
      cursor: pointer;
    }
    #gol-reset:hover { color: #111; }
    #gol-reset:focus { outline: 2px solid #333; outline-offset: 2px; }

    @media (prefers-reduced-motion: reduce) {
      #gol-canvas { display: none; }
      #gol-reset  { display: none; }
      .content    { transition: none; }
    }

    /* 画面高さが小さい場合（スマホ横向きなど）はコンテンツのみ表示・スクロール許可 */
    @media (max-height: 500px) {
      body {
        touch-action: auto;
        overscroll-behavior: auto;
        overflow-y: auto;
      }
      #gol-canvas { display: none; }
      #gol-reset  { display: none; }
      #card-close { display: none; }
      .content {
        margin: 20px auto;
        padding: 24px 28px;
      }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">メインコンテンツへスキップ</a>
  <canvas id="gol-canvas" aria-hidden="true"></canvas>
  <button id="gol-reset" aria-label="reset Game of Life" lang="en">☯&#xFE0E;</button>
  <div id="gol-status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <main id="main-content" class="content">
    <button id="card-close" aria-label="プロフィールカードを閉じる">×</button>
    {{ content }}
  </main>

  <script>
  /**
   * Conway's Game of Life — Age & Mutation Edition
   *
   * Renders to a fixed full-viewport canvas as a decorative background.
   * Advances one generation on mousemove (desktop) or touch (mobile).
   * Respects prefers-reduced-motion.
   *
   * Extensions:
   *   - Cells darken as they age (young = light gray, old = dark gray).
   *   - At MAX_AGE, a cell explodes: it dies and mutates random neighbors.
   *   - Mutated cells flash pink for MUTATION_FLASH frames, then normalise.
   */

  const CELL_SIZE      = 10;
  const COLOR_DEAD     = '#fafafa';
  const MAX_AGE        = 25;   // generations until a cell explodes
  const MUTATION_FLASH = 8;    // frames the pink flash lasts
  const MUTATION_PROB  = 0.4;  // probability each neighbor receives a mutation

  // Alive colors: light gray (young) → dark gray (old), precomputed for speed
  const ALIVE_COLORS = (() => {
    const arr = new Array(MAX_AGE + 1);
    for (let a = 0; a <= MAX_AGE; a++) {
      const t = a / MAX_AGE;
      const v = Math.round(210 - 165 * t); // rgb(210,210,210) → rgb(45,45,45)
      arr[a] = `rgb(${v},${v},${v})`;
    }
    return arr;
  })();

  // Mutation flash colors: blood-rust red (fresh) → normal young alive (faded)
  // Index MUTATION_FLASH = blood-rust, index 1 = near-normal alive
  const FLASH_COLORS = (() => {
    const arr = new Array(MUTATION_FLASH + 1);
    for (let f = 1; f <= MUTATION_FLASH; f++) {
      const t = f / MUTATION_FLASH; // 1 = blood-rust, 0 = normal
      const r = Math.round(210 - 34 * t);  // 210 → 176
      const g = Math.round(210 - 170 * t); // 210 → 40
      const b = Math.round(210 - 180 * t); // 210 → 30
      arr[f] = `rgb(${r},${g},${b})`;
    }
    return arr;
  })();

  function createGameOfLife(canvas) {
    const ctx = canvas.getContext('2d');
    let cols, rows, current, next, age, mutAge;

    /**
     * (Re)initialize the grid to a random state and fill the canvas.
     * Called on first load and on window resize.
     */
    function init() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      cols = Math.floor(canvas.width  / CELL_SIZE);
      rows = Math.floor(canvas.height / CELL_SIZE);

      const size = cols * rows;
      current = new Uint8Array(size);
      next    = new Uint8Array(size);
      age     = new Uint8Array(size);  // generation count per alive cell
      mutAge  = new Uint8Array(size);  // mutation flash countdown

      for (let i = 0; i < size; i++) {
        current[i] = Math.round(Math.random());
        // Randomise initial ages so the gradient is visible from the start
        age[i] = current[i] ? Math.floor(Math.random() * MAX_AGE) : 0;
      }

      drawAll();
    }

    /** Count the 8 neighbors of a cell, wrapping at edges (toroidal grid). */
    function countNeighbors(col, row) {
      let count = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const r = (row + dr + rows) % rows;
          const c = (col + dc + cols) % cols;
          count += current[r * cols + c];
        }
      }
      return count;
    }

    /**
     * Advance one generation:
     *
     * Phase 1 — Conway's rules produce the base next generation.
     * Phase 2 — Cells that reached MAX_AGE explode: they die and
     *            randomly mutate neighbors (set alive + pink flash).
     * Phase 3 — Update age/mutAge, redraw alive cells and transitions.
     */
    function step() {
      // Phase 1: Conway's rules → next generation
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const i = row * cols + col;
          const alive = current[i];
          const n = countNeighbors(col, row);
          next[i] = alive ? (n === 2 || n === 3 ? 1 : 0) : (n === 3 ? 1 : 0);
        }
      }

      // Phase 2: aged-out cells explode, mutating random neighbors
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const i = row * cols + col;
          if (current[i] !== 1 || age[i] < MAX_AGE) continue;
          next[i] = 0; // explode
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              if (dr === 0 && dc === 0) continue;
              if (Math.random() >= MUTATION_PROB) continue;
              const r = (row + dr + rows) % rows;
              const c = (col + dc + cols) % cols;
              const j = r * cols + c;
              next[j]   = 1;
              mutAge[j] = MUTATION_FLASH;
            }
          }
        }
      }

      // Phase 3: update age/mutAge, redraw alive cells and state transitions
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const i        = row * cols + col;
          const wasAlive = current[i];
          const isAlive  = next[i];

          // Update age: increment survivors, reset newborns, clear the dead
          if (isAlive) {
            age[i] = wasAlive ? Math.min(age[i] + 1, MAX_AGE) : 1;
          } else {
            age[i] = 0;
          }

          // Redraw all alive cells (colour changes with age) and state transitions
          if (isAlive || wasAlive !== isAlive) {
            ctx.fillStyle = isAlive
              ? (mutAge[i] > 0 ? FLASH_COLORS[mutAge[i]] : ALIVE_COLORS[age[i]])
              : COLOR_DEAD;
            ctx.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
          }

          // Decay mutation flash after drawing
          if (mutAge[i] > 0) mutAge[i]--;
        }
      }

      // Swap front and back buffers
      [current, next] = [next, current];
    }

    /** Draw all cells (used after init or resize). */
    function drawAll() {
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const i = row * cols + col;
          ctx.fillStyle = current[i]
            ? (mutAge[i] > 0 ? FLASH_COLORS[mutAge[i]] : ALIVE_COLORS[age[i]])
            : COLOR_DEAD;
          ctx.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }
      }
    }

    /** Place a 2×2 block of cells at canvas coordinates (x, y). All explode next step. */
    function placeCell(x, y) {
      const baseCol = Math.floor(x / CELL_SIZE);
      const baseRow = Math.floor(y / CELL_SIZE);
      ctx.fillStyle = ALIVE_COLORS[MAX_AGE];
      for (let dr = 0; dr < 2; dr++) {
        for (let dc = 0; dc < 2; dc++) {
          const col = baseCol + dc;
          const row = baseRow + dr;
          if (col < 0 || col >= cols || row < 0 || row >= rows) continue;
          const i    = row * cols + col;
          current[i] = 1;
          age[i]     = MAX_AGE - 3; // 3世代後に爆発
          mutAge[i]  = 0;
          ctx.fillRect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }
      }
    }

    return { init, step, placeCell };
  }

  // --- Bootstrap ---

  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    const canvas = document.getElementById('gol-canvas');
    const gol = createGameOfLife(canvas);
    const statusEl = document.getElementById('gol-status');

    const cardEl   = document.getElementById('main-content');
    const closeBtn = document.getElementById('card-close');
    const resetBtn = document.getElementById('gol-reset');

    function announceReset() {
      gol.init();
      // カードが閉じていたら復活させる
      cardEl.classList.remove('hidden');
      statusEl.textContent = 'Game of Life をリセットしました';
      setTimeout(() => { statusEl.textContent = ''; }, 2000);
    }

    closeBtn.addEventListener('click', () => {
      cardEl.classList.add('hidden');
      statusEl.textContent = 'プロフィールカードを閉じました';
      setTimeout(() => { statusEl.textContent = ''; }, 2000);
      resetBtn.focus(); // フォーカスをリセットボタンへ
    });

    gol.init();
    window.addEventListener('resize', gol.init);
    resetBtn.addEventListener('click', announceReset);

    const STEP_INTERVAL_MS  = 50;  // mousemove のステップ間隔 (ms)
    const STEP_MIN_DIST     = 5;   // mousemove で次のステップに必要な最小移動距離 (px)
    const PLACE_INTERVAL_MS = 150; // クリック/タップのセル配置間隔 (ms)
    let lastStepAt  = 0;
    let lastStepX   = 0;
    let lastStepY   = 0;
    let lastPlaceAt = 0;

    function throttledStep(x, y) {
      const now = Date.now();
      if (now - lastStepAt < STEP_INTERVAL_MS) return;
      // 座標が渡された場合は移動距離も確認する
      if (x !== undefined) {
        const dx = x - lastStepX, dy = y - lastStepY;
        if (dx * dx + dy * dy < STEP_MIN_DIST * STEP_MIN_DIST) return;
        lastStepX = x; lastStepY = y;
      }
      lastStepAt = now;
      gol.step();
    }

    function throttledPlace(x, y) {
      const now = Date.now();
      if (now - lastPlaceAt < PLACE_INTERVAL_MS) return;
      lastPlaceAt = now;
      gol.placeCell(x, y);
    }

    // --- タッチ操作 (スマホ・タブレット) ---
    // canvas は z-index:-1 のため、タッチはカード等の最上位要素に当たる。
    // window レベルで拾い、リセットボタン上のみスキップする。
    if (navigator.maxTouchPoints > 0) {
      let touchStartTime = 0, touchStartX = 0, touchStartY = 0;

      window.addEventListener('touchstart', (e) => {
        if (resetBtn.contains(e.target)) return;
        touchStartTime = Date.now();
        touchStartX    = e.touches[0].clientX;
        touchStartY    = e.touches[0].clientY;
        throttledStep();
      }, { passive: true }); // passive: true でタップの遅延を回避

      window.addEventListener('touchmove', (e) => {
        if (resetBtn.contains(e.target)) return;
        // 小さい画面（スマホ横向きなど）はスクロールを許可してGoLステップのみ実行
        if (window.innerHeight > 500) e.preventDefault();
        throttledStep(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });

      window.addEventListener('touchend', (e) => {
        if (resetBtn.contains(e.target)) return;
        const dt = Date.now() - touchStartTime;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        // 短いタップ（250ms以内・12px以内の移動）でセルを配置
        if (dt < 250 && Math.hypot(dx, dy) < 12) {
          throttledPlace(touchStartX, touchStartY);
        }
      }, { passive: true });
    }

    // --- マウス操作 (デスクトップ) ---
    window.addEventListener('mousemove', (e) => {
      if (cardEl.contains(e.target))   return; // カード上ではスキップ
      if (resetBtn.contains(e.target)) return; // リセットボタン上ではスキップ
      throttledStep(e.clientX, e.clientY);
    });

    window.addEventListener('click', (e) => {
      if (cardEl.contains(e.target))   return; // カード上ではスキップ
      if (resetBtn.contains(e.target)) return; // リセットボタン上ではスキップ
      throttledPlace(e.clientX, e.clientY);
    });
  }
  </script>
</body>
</html>
